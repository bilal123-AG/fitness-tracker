name: Build APK 

on: 
  push: 
    branches: [master] 
  workflow_dispatch: 

jobs: 
  build: 
    runs-on: ubuntu-latest 
    steps: 
      - uses: actions/checkout@v4 
      - name: Setup JDK 17 
        uses: actions/setup-java@v4 
        with: 
          java-version: "17" 
          distribution: "temurin" 
      - name: Generate debug keystore 
        run: |
          keytool -genkeypair -v -keystore debug.keystore -alias android -Keyalg RSA -Keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Dev, OU=Dev, O=Dev, L=City, S=State, C=US"
      - name: Build APK 
        run: | 
          cp -r android/* .
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Upload APK 
        uses: actions/upload-artifact@v4 
        with: 
          name: fitness-tracker-apk 
          path: app/build/outputs/apk/debug/*.apk