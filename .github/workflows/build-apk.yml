name: Build APK 

on: 
  push: 
    branches: [master] 
  workflow_dispatch: 

jobs: 
  build: 
    runs-on: ubuntu-latest 
    steps: 
      - uses: actions/checkout@v4 
      - name: Setup JDK 17 
        uses: actions/setup-java@v4 
        with: 
          java-version: "17" 
          distribution: "temurin" 
      - name: Setup Android SDK 
        uses: android-actions/setup-android@v3 
      - name: Setup Node.js 
        uses: actions/setup-node@v4 
        with: 
          node-version: "22" 
      - name: Install Bubblewrap 
        run: npm install -g @bubblewrap/cli 
      - name: Initialize TWA 
        run: | 
          echo -e "Y\nY"| bubblewrap init \
            --manifest=https://fitness-tracker-production-dd75.up.railway.app/manifest.json \
            --directory=./twa 
      - name: Build APK 
        run: cd twa && ./gradlew assembleRelease 
      - name: Upload APK 
        uses: actions/upload-artifact@v4 
        with: 
          name: fitness-tracker-apk 
          path: twa/app/build/outputs/apk/release/*.apk
