<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>健身提醒</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0d0d0d;--surface:#181818;--border:#282828;--accent:#4ade80;
    --accent-dim:#22c55e;--text:#eee;--text-dim:#777;--danger:#ef4444;
    --radius:14px;--tab-h:64px;
  }
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;
    display:flex;justify-content:center;user-select:none;-webkit-user-select:none;
    overflow-x:hidden;
  }
  .app{
    width:100%;max-width:440px;display:flex;flex-direction:column;
    min-height:100vh;min-height:100dvh;position:relative;
  }

  /* Header */
  .header{
    padding:20px 20px 12px;display:flex;align-items:center;justify-content:space-between;
  }
  .header h1{font-size:20px;font-weight:700;letter-spacing:-0.3px;}
  .header-date{font-size:13px;color:var(--text-dim);}

  /* Tab Content */
  .tab-content{flex:1;overflow-y:auto;padding:0 20px 20px;display:none;}
  .tab-content.active{display:flex;flex-direction:column;gap:20px;}

  /* ---- TIMER TAB ---- */
  .timer-ring-wrap{display:flex;flex-direction:column;align-items:center;gap:16px;padding:8px 0;}
  .ring-box{position:relative;width:200px;height:200px;}
  .ring-box svg{transform:rotate(-90deg);}
  .ring-bg{fill:none;stroke:var(--border);stroke-width:8;}
  .ring-fg{fill:none;stroke:var(--accent);stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .3s linear,stroke .3s;}
  .ring-fg.warning{stroke:#f59e0b}
  .ring-fg.alert{stroke:var(--danger)}
  .ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;}
  .ring-time{font-size:44px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-1px;}
  .ring-label{font-size:12px;color:var(--text-dim);}
  .timer-btns{display:flex;gap:10px;}
  .timer-btns .btn{padding:10px 22px;}

  /* Buttons */
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:5px;
    padding:10px 18px;border-radius:10px;border:none;cursor:pointer;
    font-size:14px;font-weight:600;transition:all .15s;font-family:inherit;
  }
  .btn-primary{background:var(--accent);color:#000;}
  .btn-primary:hover{background:var(--accent-dim);}
  .btn-outline{background:transparent;color:var(--text-dim);border:1px solid var(--border);}
  .btn-outline:hover{color:var(--text);border-color:#555;}
  .btn-danger{background:var(--danger);color:#fff;}
  .btn-danger:hover{opacity:.85;}
  .btn-sm{padding:6px 12px;font-size:12px;border-radius:7px;}
  .btn:disabled{opacity:.35;cursor:not-allowed;}

  /* Exercise card */
  .ex-card{
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:24px;display:flex;flex-direction:column;align-items:center;gap:14px;
    animation:fadeUp .35s ease;
  }
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  .ex-icon{font-size:52px;line-height:1;}
  .ex-name{font-size:20px;font-weight:700;}
  .ex-desc{font-size:13px;color:var(--text-dim);text-align:center;line-height:1.55;}
  .ex-actions{display:flex;gap:10px;width:100%;}
  .ex-actions .btn{flex:1;padding:12px;}

  /* Stats */
  .stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .stat-item{
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:14px 8px;text-align:center;display:flex;flex-direction:column;gap:3px;
  }
  .stat-num{font-size:22px;font-weight:700;}
  .stat-lbl{font-size:11px;color:var(--text-dim);}

  /* Settings inline */
  .setting-inline{
    display:flex;align-items:center;gap:8px;
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;
  }
  .setting-inline span{font-size:13px;flex:1;}
  .setting-inline input{
    background:var(--bg);border:1px solid var(--border);border-radius:7px;
    color:var(--text);padding:7px 10px;font-size:13px;width:72px;text-align:center;
  }
  .toggle-btn{
    width:44px;height:25px;border-radius:13px;background:var(--border);border:none;
    cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;
  }
  .toggle-btn.on{background:var(--accent);}
  .toggle-btn::after{
    content:"";position:absolute;top:2px;left:2px;
    width:21px;height:21px;border-radius:50%;background:#fff;transition:transform .2s;
  }
  .toggle-btn.on::after{transform:translateX(19px);}

  /* ---- PLAN TAB ---- */
  .plan-list{display:flex;flex-direction:column;gap:10px;}
  .plan-item{
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:14px 16px;display:flex;align-items:center;gap:14px;
  }
  .plan-item.off{opacity:.4;}
  .plan-time{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;
    min-width:56px;text-align:center;}
  .plan-info{flex:1;display:flex;flex-direction:column;gap:2px;}
  .plan-label{font-size:14px;}
  .plan-next{font-size:11px;color:var(--text-dim);}
  .plan-toggle{flex-shrink:0;}
  .plan-delete{
    background:none;border:none;color:var(--text-dim);cursor:pointer;
    font-size:16px;padding:4px 6px;border-radius:6px;line-height:1;
  }
  .plan-delete:hover{color:var(--danger);}

  .add-plan{
    background:var(--surface);border:1px dashed var(--border);border-radius:var(--radius);
    padding:16px;display:flex;gap:10px;align-items:center;
  }
  .add-plan input[type=time]{
    background:var(--bg);border:1px solid var(--border);border-radius:7px;
    color:var(--text);padding:8px 12px;font-size:14px;font-family:inherit;
  }
  .add-plan input[type=text]{
    background:var(--bg);border:1px solid var(--border);border-radius:7px;
    color:var(--text);padding:8px 12px;font-size:14px;flex:1;min-width:0;font-family:inherit;
  }
  .add-plan input::placeholder{color:#555;}
  .empty-plan{text-align:center;color:var(--text-dim);padding:40px 0;font-size:14px;line-height:1.6;}

  /* ---- FOCUS OVERLAY ---- */
  .focus-overlay{
    position:fixed;inset:0;background:#000;z-index:200;
    display:none;flex-direction:column;align-items:center;justify-content:center;
    gap:32px;padding:32px;
  }
  .focus-overlay.active{display:flex;}
  .focus-icon{font-size:72px;line-height:1;animation:pulse 2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
  .focus-title{font-size:28px;font-weight:700;text-align:center;}
  .focus-desc{font-size:15px;color:var(--text-dim);text-align:center;max-width:300px;line-height:1.6;}
  .focus-timer{font-size:64px;font-weight:700;font-variant-numeric:tabular-nums;}
  .focus-bar-wrap{width:280px;height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
  .focus-bar{height:100%;background:var(--accent);border-radius:3px;transition:width .3s linear;}
  .focus-msg{font-size:14px;color:var(--text-dim);text-align:center;line-height:1.6;}
  .focus-exit{
    background:none;border:1px solid #333;color:var(--text-dim);padding:10px 28px;
    border-radius:10px;cursor:pointer;font-size:13px;font-family:inherit;
  }
  .focus-exit:hover{color:var(--text);border-color:#666;}

  /* ---- TAB BAR ---- */
  .tab-bar{
    display:flex;border-top:1px solid var(--border);height:var(--tab-h);
    background:var(--bg);position:sticky;bottom:0;flex-shrink:0;
  }
  .tab{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:3px;cursor:pointer;color:var(--text-dim);transition:color .15s;
    border:none;background:none;font-family:inherit;font-size:11px;padding:0;
  }
  .tab.active{color:var(--accent);}
  .tab-icon{font-size:20px;line-height:1;}

  /* Toast */
  .toast{
    position:fixed;top:24px;left:50%;transform:translateX(-50%);
    background:var(--accent);color:#000;padding:10px 24px;border-radius:10px;
    font-size:14px;font-weight:600;z-index:300;pointer-events:none;
    opacity:0;transition:opacity .3s;
  }
  .toast.show{opacity:1;}

  /* Scrollbar */
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
</style>
</head>
<body>

<div class="app" id="app">
  <!-- Header -->
  <div class="header">
    <h1>💪 健身提醒</h1>
    <span class="header-date" id="headerDate"></span>
  </div>

  <!-- ====== TIMER TAB ====== -->
  <div class="tab-content active" id="tabTimer">
    <div class="timer-ring-wrap">
      <div class="ring-box">
        <svg width="200" height="200" viewBox="0 0 200 200">
          <circle class="ring-bg" cx="100" cy="100" r="92"/>
          <circle class="ring-fg" id="ringFg" cx="100" cy="100" r="92"
            stroke-dasharray="578.05" stroke-dashoffset="0"/>
        </svg>
        <div class="ring-center">
          <span class="ring-time" id="timeDisplay">45:00</span>
          <span class="ring-label" id="timeLabel">准备开始</span>
        </div>
      </div>
      <div class="timer-btns">
        <button class="btn btn-primary" id="btnStart" onclick="toggleTimer()">▶ 开始</button>
        <button class="btn btn-outline" id="btnSkip" onclick="skipToReminder()" disabled>跳过</button>
      </div>
    </div>

    <div class="ex-card" id="exerciseCard" style="display:none">
      <div class="ex-icon" id="exIcon"></div>
      <div class="ex-name" id="exName"></div>
      <div class="ex-desc" id="exDesc"></div>
      <div class="ex-actions">
        <button class="btn btn-primary" onclick="completeExercise()">✅ 完成</button>
        <button class="btn btn-outline" onclick="enterFocus()">📵 专注模式</button>
      </div>
    </div>

    <div class="stat-row">
      <div class="stat-item"><span class="stat-num" id="statToday">0</span><span class="stat-lbl">今日</span></div>
      <div class="stat-item"><span class="stat-num" id="statStreak">0</span><span class="stat-lbl">连续天数</span></div>
      <div class="stat-item"><span class="stat-num" id="statTotal">0</span><span class="stat-lbl">总计</span></div>
    </div>

    <div class="setting-inline">
      <span>⏱ 间隔（分钟）</span>
      <input type="number" id="settingInterval" min="5" max="180" value="45" onchange="updateInterval()">
      <span style="flex:0;margin-left:12px;">🔔</span>
      <button class="toggle-btn on" id="toggleSound" onclick="toggleSetting('sound')"></button>
      <span style="flex:0;margin-left:8px;">💬</span>
      <button class="toggle-btn on" id="toggleNotify" onclick="toggleSetting('notify')"></button>
    </div>
  </div>

  <!-- ====== PLAN TAB ====== -->
  <div class="tab-content" id="tabPlan">
    <div class="plan-list" id="planList"></div>
    <div id="planEmpty" class="empty-plan" style="display:none">
      📋 还没有计划<br>在下方添加每日提醒时间
    </div>
    <div class="add-plan">
      <input type="time" id="planTimeInput" value="09:00">
      <input type="text" id="planLabelInput" placeholder="标签（可选）" maxlength="10">
      <button class="btn btn-primary btn-sm" onclick="addPlan()">＋ 添加</button>
    </div>
  </div>

  <!-- ====== FOCUS OVERLAY ====== -->
  <div class="focus-overlay" id="focusOverlay">
    <div class="focus-icon" id="focusIcon">🧘</div>
    <div class="focus-title" id="focusTitle">肩部环绕</div>
    <div class="focus-desc" id="focusDesc">双肩向前画圈 10 次，再向后画圈 10 次</div>
    <div class="focus-bar-wrap"><div class="focus-bar" id="focusBar" style="width:100%"></div></div>
    <div class="focus-timer" id="focusTimer">60</div>
    <div class="focus-msg">📵 放下手机，专注运动<br>完成后方可退出</div>
  </div>

  <!-- ====== TAB BAR ====== -->
  <div class="tab-bar">
    <button class="tab active" data-tab="tabTimer" onclick="switchTab('tabTimer')">
      <span class="tab-icon">⏱</span>计时
    </button>
    <button class="tab" data-tab="tabPlan" onclick="switchTab('tabPlan')">
      <span class="tab-icon">📋</span>计划
    </button>
    <button class="tab" data-tab="tabFocus" onclick="switchTab('tabFocus')">
      <span class="tab-icon">📵</span>专注
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ──── Constants ──────────────────────────────
const CIRCUMFERENCE = 2 * Math.PI * 92; // ~578.05
let intervalMinutes = 45;
let secondsLeft = intervalMinutes * 60;
let timerRunning = false;
let timerInterval = null;
let soundEnabled = true;
let notifyEnabled = true;
let lastExerciseIndex = -1;
let currentExercise = null;

// ──── Exercise Library ───────────────────────
const exercises = [
  { icon:"🙆",  name:"颈部拉伸",   desc:"缓慢向左、向右倾斜头部，每侧保持 10 秒，重复 3 次。" },
  { icon:"🤸",  name:"肩部环绕",   desc:"双肩向前画圈 10 次，再向后画圈 10 次，放松肩颈。" },
  { icon:"🧘",  name:"坐姿前屈",   desc:"坐在椅子上，慢慢向前弯腰，手触脚踝，保持 15 秒。" },
  { icon:"🦵",  name:"站立提踵",   desc:"双手扶桌，踮起脚尖保持 2 秒后放下，重复 20 次。" },
  { icon:"💪",  name:"手腕伸展",   desc:"手臂前伸掌心向外，另一只手轻拉手指向后，每侧 10 秒。" },
  { icon:"🙌",  name:"向上伸展",   desc:"双手交叉举过头顶，掌心向上尽力延伸，保持 10 秒。" },
  { icon:"🐱",  name:"猫牛式",     desc:"坐椅子上，吸气挺胸塌腰，呼气弓背低头，重复 8 次。" },
  { icon:"🔄",  name:"腰部扭转",   desc:"坐直后缓慢向左扭转上半身，保持 10 秒，换右侧重复。" },
  { icon:"👁",  name:"20-20-20",  desc:"看 6 米外物体 20 秒，缓解眼疲劳。每 20 分钟一次。" },
  { icon:"🖐",  name:"手指开合",   desc:"用力张开手指保持 3 秒，再握拳 3 秒，重复 15 次。" },
  { icon:"🧍",  name:"靠墙站立",   desc:"脚跟、臀部、肩胛骨、后脑贴墙，保持 30 秒。" },
  { icon:"🏃",  name:"原地踏步",   desc:"原地高抬腿踏步 60 秒，手臂自然摆动，提升心率。" },
  { icon:"🪑",  name:"椅上后仰",   desc:"双手扶后脑，轻靠椅背打开胸腔，保持 10 秒。" },
  { icon:"🤲",  name:"合掌前推",   desc:"双手合十于胸前，缓慢前推至手臂伸直，保持 10 秒。" },
  { icon:"🦶",  name:"脚踝转动",   desc:"抬起一只脚，顺时针逆时针各转动 10 圈。" },
];

function pickExercise() {
  let idx;
  do { idx = Math.floor(Math.random() * exercises.length); }
  while (idx === lastExerciseIndex && exercises.length > 1);
  lastExerciseIndex = idx;
  return exercises[idx];
}

// ──── Audio ──────────────────────────────────
function playSound() {
  if (!soundEnabled) return;
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type="sine";g.gain.setValueAtTime(.25,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.01,ctx.currentTime+.4);
    o.frequency.setValueAtTime(880,ctx.currentTime);
    o.frequency.setValueAtTime(1100,ctx.currentTime+.12);
    o.start();o.stop(ctx.currentTime+.4);
  }catch(_){}
}

// ──── Notification ───────────────────────────
function sendNotification(title,body) {
  if (!notifyEnabled) return;
  if (Notification.permission==="granted") new Notification(title,{body,icon:"💪"});
  else if (Notification.permission==="default") Notification.requestPermission().then(p=>{if(p==="granted")sendNotification(title,body);});
}

// ──── Toast ──────────────────────────────────
function showToast(msg) {
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  clearTimeout(t._tid);t._tid=setTimeout(()=>t.classList.remove("show"),2000);
}

// ──── Stats ──────────────────────────────────
function loadStats() {
  let s;
  try { s=JSON.parse(localStorage.getItem("fitness_stats")||"{}"); } catch(_) { s={}; }
  const today=new Date().toDateString();
  if (s.today!==today) { s.today=today;s.count=0;const y=new Date(Date.now()-864e5).toDateString();s.streak=(s.lastDate===y)?(s.streak||0):0; }
  s.lastDate=today;s.count=s.count||0;s.streak=s.streak||0;s.total=s.total||0;
  localStorage.setItem("fitness_stats",JSON.stringify(s));
  return s;
}
function saveStats(s) { localStorage.setItem("fitness_stats",JSON.stringify(s)); }
function updateStatsUI() {
  const s=loadStats();
  document.getElementById("statToday").textContent=s.count;
  document.getElementById("statStreak").textContent=s.streak;
  document.getElementById("statTotal").textContent=s.total;
}
function recordCompletion() {
  const s=loadStats();s.count++;s.total++;
  if (s.count===1&&s.streak===0) s.streak=1; else if (s.count===1) s.streak++;
  saveStats(s);updateStatsUI();
}

// ──── Timer ──────────────────────────────────
function updateTimerUI() {
  const m=Math.floor(secondsLeft/60),s=secondsLeft%60;
  document.getElementById("timeDisplay").textContent=String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
  const total=intervalMinutes*60,progress=(total-secondsLeft)/total;
  document.getElementById("ringFg").style.strokeDashoffset=CIRCUMFERENCE*(1-progress);
  const r=secondsLeft/total,fg=document.getElementById("ringFg");
  fg.classList.remove("warning","alert");
  if(r<.15) fg.classList.add("alert"); else if(r<.3) fg.classList.add("warning");
}
function setLabel(t) { document.getElementById("timeLabel").textContent=t; }

function toggleTimer() { timerRunning?pauseTimer():startTimer(); }
function startTimer() {
  if (secondsLeft<=0) secondsLeft=intervalMinutes*60;
  timerRunning=true;
  document.getElementById("btnStart").textContent="⏸ 暂停";
  document.getElementById("btnSkip").disabled=false;
  setLabel("计时中…");
  if (Notification.permission==="default") Notification.requestPermission();
  timerInterval=setInterval(()=>{secondsLeft--;updateTimerUI();if(secondsLeft<=0)triggerReminder();},1000);
}
function pauseTimer() {
  timerRunning=false;clearInterval(timerInterval);
  document.getElementById("btnStart").textContent="▶ 继续";setLabel("已暂停");
}
function skipToReminder() {
  secondsLeft=0;updateTimerUI();
  if(timerRunning){clearInterval(timerInterval);timerRunning=false;}
  triggerReminder();
}
function triggerReminder() {
  clearInterval(timerInterval);timerRunning=false;
  document.getElementById("btnStart").textContent="▶ 开始";
  document.getElementById("btnStart").disabled=true;
  document.getElementById("btnSkip").disabled=true;
  setLabel("该活动一下了！");
  const ex=pickExercise();currentExercise=ex;
  document.getElementById("exIcon").textContent=ex.icon;
  document.getElementById("exName").textContent=ex.name;
  document.getElementById("exDesc").textContent=ex.desc;
  document.getElementById("exerciseCard").style.display="";
  playSound();setTimeout(playSound,600);
  sendNotification("⏰ 该活动一下了！",ex.name+" — "+ex.desc);
  showToast("🔔 "+ex.name);
}
function completeExercise() {
  recordCompletion();
  secondsLeft=intervalMinutes*60;updateTimerUI();
  document.getElementById("exerciseCard").style.display="none";
  document.getElementById("btnStart").disabled=false;
  document.getElementById("btnStart").textContent="▶ 开始";
  document.getElementById("btnSkip").disabled=true;
  setLabel("准备开始");
  showToast("👍 完成！继续加油");
}

// ──── Settings ───────────────────────────────
function updateInterval() {
  const inp=document.getElementById("settingInterval");let v=parseInt(inp.value,10);
  if(isNaN(v)||v<5)v=5;if(v>180)v=180;inp.value=v;intervalMinutes=v;
  if(!timerRunning){secondsLeft=intervalMinutes*60;updateTimerUI();}
}
function toggleSetting(type) {
  if(type==="sound"){soundEnabled=!soundEnabled;document.getElementById("toggleSound").classList.toggle("on",soundEnabled);}
  else if(type==="notify"){notifyEnabled=!notifyEnabled;document.getElementById("toggleNotify").classList.toggle("on",notifyEnabled);if(notifyEnabled&&Notification.permission==="default")Notification.requestPermission();}
}

// ──── Tab Switching ──────────────────────────
function switchTab(tabId) {
  document.querySelectorAll(".tab-content").forEach(el=>el.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(el=>el.classList.remove("active"));
  document.getElementById(tabId).classList.add("active");
  document.querySelector(`.tab[data-tab="${tabId}"]`).classList.add("active");
  if (tabId==="tabPlan") renderPlans();
  if (tabId==="tabFocus") initFocusTab();
}

// ──── Plan Feature ───────────────────────────
let plans = [];
function loadPlans() { try{plans=JSON.parse(localStorage.getItem("fitness_plans")||"[]");}catch(_){plans=[];} }
function savePlans() { localStorage.setItem("fitness_plans",JSON.stringify(plans)); }
function addPlan() {
  const timeVal=document.getElementById("planTimeInput").value;
  const labelVal=document.getElementById("planLabelInput").value.trim();
  if(!timeVal) return showToast("请选择时间");
  plans.push({id:Date.now(),time:timeVal,label:labelVal||"运动提醒",enabled:true});
  savePlans();renderPlans();
  document.getElementById("planLabelInput").value="";
  showToast("✅ 计划已添加");
}
function removePlan(id) { plans=plans.filter(p=>p.id!==id);savePlans();renderPlans(); }
function togglePlan(id) {
  const p=plans.find(p=>p.id===id);if(p){p.enabled=!p.enabled;savePlans();renderPlans();}
}
function renderPlans() {
  loadPlans();
  const list=document.getElementById("planList");
  const empty=document.getElementById("planEmpty");
  plans.sort((a,b)=>a.time.localeCompare(b.time));
  if (plans.length===0) { list.innerHTML="";empty.style.display="";return; }
  empty.style.display="none";
  const now=new Date();const curMin=now.getHours()*60+now.getMinutes();
  list.innerHTML=plans.map(p=>{
    const [h,m]=p.time.split(":").map(Number);
    const planMin=h*60+m;
    let nextText="";
    if (planMin>curMin) { const diff=planMin-curMin;nextText=`${Math.floor(diff/60)}小时${diff%60}分钟后提醒`; }
    else { nextText="明天"; }
    return `<div class="plan-item${p.enabled?'':' off'}">
      <div class="plan-time">${p.time}</div>
      <div class="plan-info"><span class="plan-label">${p.label}</span><span class="plan-next">${nextText}</span></div>
      <button class="toggle-btn${p.enabled?' on':''} plan-toggle" onclick="togglePlan(${p.id})"></button>
      <button class="plan-delete" onclick="removePlan(${p.id})" title="删除">✕</button>
    </div>`;
  }).join("");
}

// Plan background checker (every 30s)
function checkPlans() {
  loadPlans();
  const now=new Date();const curTime=String(now.getHours()).padStart(2,"0")+":"+String(now.getMinutes()).padStart(2,"0");
  for (const p of plans) {
    if (!p.enabled) continue;
    if (p.time===curTime && p._lastTriggered!==now.toDateString()) {
      p._lastTriggered=now.toDateString();
      savePlans();
      currentExercise=pickExercise();
      switchTab("tabTimer");
      document.getElementById("exIcon").textContent=currentExercise.icon;
      document.getElementById("exName").textContent=currentExercise.name;
      document.getElementById("exDesc").textContent=currentExercise.desc;
      document.getElementById("exerciseCard").style.display="";
      document.getElementById("btnStart").disabled=true;
      document.getElementById("btnSkip").disabled=true;
      setLabel("计划提醒！");
      secondsLeft=0;updateTimerUI();
      playSound();setTimeout(playSound,600);
      sendNotification("📋 "+p.label,currentExercise.name+" — "+currentExercise.desc);
      showToast("📋 "+p.label);
      break;
    }
  }
}
setInterval(checkPlans,30000);

// ──── Focus Mode ─────────────────────────────
let focusInterval=null;
function enterFocus() {
  if (!currentExercise) currentExercise=pickExercise();
  const ex=currentExercise;
  document.getElementById("focusIcon").textContent=ex.icon;
  document.getElementById("focusTitle").textContent=ex.name;
  document.getElementById("focusDesc").textContent=ex.desc;
  document.getElementById("focusOverlay").classList.add("active");
  startFocusTimer(60);
}
function initFocusTab() {
  if (document.getElementById("focusOverlay").classList.contains("active")) return;
  const ex=pickExercise();
  document.getElementById("focusIcon").textContent=ex.icon;
  document.getElementById("focusTitle").textContent=ex.name;
  document.getElementById("focusDesc").textContent=ex.desc;
}
function startFocusTimer(duration) {
  clearInterval(focusInterval);
  let remaining=duration;
  document.getElementById("focusTimer").textContent=remaining;
  document.getElementById("focusBar").style.width="100%";
  focusInterval=setInterval(()=>{
    remaining--;
    document.getElementById("focusTimer").textContent=remaining;
    document.getElementById("focusBar").style.width=(remaining/duration*100)+"%";
    if (remaining<=0) {
      clearInterval(focusInterval);
      recordCompletion();
      document.getElementById("focusOverlay").classList.remove("active");
      secondsLeft=intervalMinutes*60;updateTimerUI();
      document.getElementById("exerciseCard").style.display="none";
      document.getElementById("btnStart").disabled=false;
      document.getElementById("btnStart").textContent="▶ 开始";
      document.getElementById("btnSkip").disabled=true;
      setLabel("准备开始");
      showToast("🎉 专注完成！真棒");
    }
  },1000);
}

// ──── Init ───────────────────────────────────
function init() {
  document.getElementById("ringFg").style.strokeDasharray=CIRCUMFERENCE;
  updateTimerUI();updateStatsUI();
  document.getElementById("headerDate").textContent=new Date().toLocaleDateString("zh-CN",{weekday:"short",month:"short",day:"numeric"});
}
init();
</script>
