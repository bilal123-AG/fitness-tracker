<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#4ade80">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="健身追踪">
<link rel="manifest" href="/manifest.json">
<title>健身追踪</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;--surface:#181818;--surface2:#242424;--border:#282828;
  --accent:#4ade80;--accent2:#22c55e;--text:#eee;--dim:#777;--danger:#ef4444;
  --radius:14px;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent;
}
.app{max-width:480px;margin:0 auto;padding:0 16px 100px}

/* 导航 */
nav{
  display:flex;gap:4px;background:var(--surface);border-radius:var(--radius);
  padding:4px;position:sticky;top:8px;z-index:10;margin-bottom:20px;
}
.nav-btn{
  flex:1;padding:10px 0;border:none;border-radius:10px;background:transparent;
  color:var(--dim);font-size:14px;cursor:pointer;transition:.2s;
}
.nav-btn.active{background:var(--accent);color:#000;font-weight:600}
.tab{display:none}
.tab.active{display:block}

/* 通用 */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.btn{padding:10px 20px;border:none;border-radius:20px;font-size:14px;font-weight:600;cursor:pointer;transition:.15s}
.btn:active{opacity:.7}
.btn-primary{background:var(--accent);color:#000}
.btn-primary-big{background:var(--accent);color:#000;padding:16px 36px;font-size:17px;border-radius:24px}
.btn-secondary{background:var(--surface2);color:var(--text)}
.btn-danger{background:var(--danger);color:#fff}
.btn-ghost{background:transparent;color:var(--dim);border:1px solid var(--border)}
.btn-sm{padding:6px 14px;font-size:12px}
.input{
  background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:8px;
  padding:10px 12px;font-size:14px;width:100%;outline:none;
}
.input:focus{border-color:var(--accent)}

/* 离线条 */
.offline-bar{background:#f59e0b;color:#000;text-align:center;padding:10px;border-radius:var(--radius);margin-bottom:12px;font-size:13px;font-weight:500}

/* 首页 */
.hero{padding:20px 0}.hero h1{font-size:26px;font-weight:700}.hero p{color:var(--dim);font-size:15px;margin-top:4px}
.status-card{display:flex;justify-content:space-between;align-items:center}
.status-card.done{background:var(--accent2);color:#000;border-color:var(--accent2)}
.badge{font-size:12px;background:var(--border);padding:6px 14px;border-radius:20px;font-weight:600}
.status-card.done .badge{background:rgba(0,0,0,.15)}
.history-row{padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.history-row:last-child{border-bottom:none}

/* 训练 */
.train-header{display:flex;justify-content:space-between;align-items:center;padding:16px 0}
.train-timer{font-size:40px;font-weight:700;font-variant-numeric:tabular-nums}
.music-toggle{font-size:22px;cursor:pointer;padding:4px 8px;border-radius:8px;opacity:.5;transition:.2s}.music-toggle.on{opacity:1;background:rgba(74,222,128,.2)}
.train-badge{font-size:13px;color:var(--accent);background:rgba(74,222,128,.15);padding:6px 14px;border-radius:20px}
.train-main{display:flex;flex-direction:column;align-items:center;gap:20px}
.input-cards{display:flex;flex-direction:column;gap:12px;width:100%}
.input-card{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 12px;display:flex;flex-direction:column;align-items:center;gap:12px}
.input-label{font-size:13px;color:var(--dim)}
.stepper{display:flex;align-items:center;gap:12px}
.stepper-btn{width:56px;height:56px;border-radius:50%;background:var(--border);color:var(--text);font-size:28px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
.stepper-val{width:90px;text-align:center;font-size:36px;font-weight:700;background:transparent;color:var(--text);border:none;outline:none}
.quick-picks{display:flex;gap:8px;margin-top:8px}
.qp{font-size:11px;padding:4px 12px;border-radius:12px;background:var(--border);color:var(--dim);cursor:pointer}
.qp.active{background:var(--accent);color:#000}
.rest-card{background:var(--surface);border:2px solid var(--accent);border-radius:var(--radius);padding:24px;text-align:center;width:100%;margin-top:8px}
.rest-card h2{font-size:60px;color:var(--accent)}
.add-section{margin-top:16px}
.set-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.set-badge{font-size:11px;background:var(--surface2);padding:4px 10px;border-radius:8px;color:var(--dim)}

/* 动作库 */
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.filter-item{padding:6px 14px;border-radius:20px;font-size:12px;background:transparent;border:1px solid var(--border);color:var(--dim);cursor:pointer}
.filter-item.active{background:var(--accent);color:#000;border-color:var(--accent)}
.move-list{display:flex;flex-direction:column;gap:8px}
.move-card{padding:14px;background:var(--surface2);border-radius:var(--radius);cursor:pointer;transition:.2s}
.move-card:active{background:#2d2d2d}
.move-meta{display:block;font-size:12px;color:var(--dim);margin-top:4px}

/* 计时器 */
.timer-big{font-size:80px;font-weight:700;text-align:center;padding:30px 0;font-variant-numeric:tabular-nums}
.preset-row{display:flex;gap:8px;justify-content:center;margin-top:12px}
.preset-btn{padding:8px 16px;border-radius:20px;background:var(--surface2);color:var(--dim);font-size:13px;cursor:pointer}

/* 数据 */
.stat-row{display:flex;gap:10px}
.stat-card{flex:1;background:var(--surface);border-radius:var(--radius);padding:16px;text-align:center}
.stat-val{font-size:28px;font-weight:700;color:var(--accent)}
.stat-lbl{font-size:12px;color:var(--dim);margin-top:4px}
.del-btn{color:var(--danger);cursor:pointer;font-size:12px}

/* 登录 */
.login-page{display:flex;flex-direction:column;align-items:center;padding-top:60px;gap:30px}
.login-hero{text-align:center}
.login-hero h1{font-size:28px;margin-top:12px}
.login-form{width:100%;display:flex;flex-direction:column;gap:16px}

@media(max-width:360px){.timer-big{font-size:60px}.train-timer{font-size:32px}}

/* 音乐 */
.music-card{text-align:center}
.music-bpm{font-size:64px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums}
.music-label{font-size:12px;color:var(--dim);margin-bottom:8px}
.bpm-slider{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;background:var(--border);outline:none;margin:20px 0}
.bpm-slider::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;border-radius:50%;background:var(--accent);cursor:pointer}
.bpm-presets{display:flex;gap:8px;justify-content:center;margin:12px 0;flex-wrap:wrap}
.bpm-preset{padding:10px 20px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--dim);font-size:14px;cursor:pointer;transition:.2s}
.bpm-preset.active{background:var(--accent);color:#000;border-color:var(--accent)}
.music-platform{display:flex;align-items:center;gap:14px;padding:18px 16px;border-radius:12px;color:#fff;cursor:pointer;transition:.2s;font-weight:600}.music-platform:active{opacity:.8;transform:scale(.98)}
.music-status{font-size:13px;color:var(--dim);margin-top:12px}
</style>
</head>
<body>
<nav><button class="nav-btn active" data-tab="home" onclick="switchTab('home')">首页</button>
    <button class="nav-btn" data-tab="library" onclick="switchTab('library')">动作库</button>
    <button class="nav-btn" data-tab="timer" onclick="switchTab('timer')">计时器</button>
    <button class="nav-btn" data-tab="training" onclick="switchTab('training')">训练</button>
    <button class="nav-btn" data-tab="music" onclick="switchTab('music')">音乐</button>
    <button class="nav-btn" data-tab="data" onclick="switchTab('data')">数据</button>
  </nav><div id="app" class="app"><div id="tab-home" class="tab active"></div>
  <div id="tab-library" class="tab"></div>
  
  <div id="tab-timer" class="tab"></div><div id="tab-music" class="tab"></div><div id="tab-data" class="tab"></div>
  <div id="tab-training" class="tab"></div>
</div><script src="/app.js?v=8"></script>
</body>
</html>
